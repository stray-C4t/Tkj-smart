<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ judul }} Quiz - TKJ Smart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz_kerjakan.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="quiz-container">
        <div class="quiz-top-bar">
			<div class="quest-count">
				<i class="fas fa-list-ol"></i> <span id="current-quest-num">1</span>/{{ soal_list|length }}
			</div>
			
			<div class="timer-wrapper">
				<div id="timer-bar" class="timer-bar"></div>
			</div>

			<div class="right-elements">
				<div class="score-display">
					<span id="score-val">0</span> <i class="fas fa-bolt"></i>
				</div>
				<a href="/quiz" class="exit-btn"><i class="fas fa-times"></i></a>
			</div>
		</div>

        <div class="question-section" id="quiz-content">
            <h1 id="question-text">Memuat pertanyaan...</h1>
        </div>

        <div id="options-container" class="options-container">
            </div>

        <div id="result-screen" class="result-screen hidden">
			<div class="result-content">
				<i class="fas fa-trophy trophy-icon"></i>
				
				<h2>Kuis Selesai!</h2>
				<div class="final-score-circle">
					<span id="final-score">0</span>
				</div>
				<a href="/quiz" class="btn-back-menu">Kembali ke Menu</a>
			</div>
		</div>
    </div>

    <script>
        // Mengubah data Python ke JSON JavaScript
        const soalData = {{ soal_list | tojson | safe }};
        let currentIdx = 0;
        let score = 0;
        let timer;
        const totalTime = 15;

        function loadQuestion() {
            // CEK: Jika data kosong, tampilkan pesan error, jangan ke layar result
            if (!soalData || soalData.length === 0) {
                document.getElementById('question-text').innerText = "Data soal tidak ditemukan di database.";
                return;
            }

            if (currentIdx >= soalData.length) {
                showFinalResult();
                return;
            }

            const data = soalData[currentIdx];
            document.getElementById('question-text').innerText = data.tanya;
            document.getElementById('current-quest-num').innerText = currentIdx + 1;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.opsi.forEach((text) => {
                const btn = document.createElement('div');
                btn.className = 'option-box';
                btn.innerText = text;
                btn.onclick = () => handleSelection(btn, text, data.kunci);
                container.appendChild(btn);
            });

            startTimer();
        }

        function handleSelection(selectedBtn, selectedText, correctText) {
            clearInterval(timer);
            const allBtns = document.querySelectorAll('.option-box');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (selectedText === correctText) {
                selectedBtn.classList.add('correct-anim');
                score += 100;
            } else {
                selectedBtn.classList.add('wrong-anim');
                score = Math.max(0, score - 50);
                allBtns.forEach(b => {
                    if (b.innerText === correctText) b.classList.add('correct-anim');
                });
            }

            document.getElementById('score-val').innerText = score;

            setTimeout(() => {
                currentIdx++;
                loadQuestion();
            }, 1500);
        }

        function startTimer() {
            let timeLeft = totalTime;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 0.1;
                let width = (timeLeft / totalTime) * 100;
                bar.style.width = width + '%';

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleSelection({classList: {add: ()=>{}}}, '', soalData[currentIdx].kunci);
                }
            }, 100);
        }

        function showFinalResult() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
