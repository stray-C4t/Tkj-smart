<!DOCTYPE html>
<html>
<head>
    <title>Tambah Akun - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='form_akun.css') }}">
</head>
<body style="display: block; background: #f4f7f6; padding: 50px;">
    <div style="max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <h2 style="text-align: center;">Tambah Siswa</h2>
        <form action="/admin/save-account" method="POST">
			<div class="form-group">
				<label>Nama Lengkap</label>
				<input type="text" name="nama_lengkap" class="form-control" placeholder="Nama Asli Siswa" required>
			</div>
			<div class="form-group">
				<label>Username</label>
				<input type="text" name="username" class="form-control" required>
			</div>
			<div class="form-group">
				<label>Password</label>
				<input type="password" name="password" class="form-control" required>
			</div>
			<div class="form-group">
				<label>email</label>
				<input type="text" name="email" class="form-control" required>
			</div>
			<div class="form-group">
				<label>Role / Jabatan</label>
				<select name="role" class="form-control">
					<option value="siswa">Siswa</option>
					<option value="admin">Admin / Guru</option>
				</select>
			</div>
			<button type="submit" class="btn btn-primary btn-block">Simpan Akun</button>
		</form>
    </div>
    <script>
	let isEdit = {{ is_edit | tojson if is_edit else 'false' }};
	let user = {{ user | tojson if user else 'null' }};

	window.onload = function() {
		if (isEdit && user) {

			// isi field
			document.querySelector('input[name="nama_lengkap"]').value = user.nama_lengkap;
			document.querySelector('input[name="username"]').value = user.username;
			document.querySelector('input[name="email"]').value = user.email;

			// set role
			document.querySelector('select[name="role"]').value = user.role;

			// ⚠️ password dikosongkan (biar tidak bocor)
			document.querySelector('input[name="password"]').placeholder = "Kosongkan jika tidak ingin mengubah password";
			document.querySelector('input[name="password"]').required = false;

			// ubah form action → update
			document.querySelector('form').action = `/admin/update-user/${user.id}`;

			// ubah tombol
			document.querySelector('button[type="submit"]').innerText = "Update Akun";

			// ubah judul
			document.querySelector('h2').innerText = "Edit Akun";
		}
	};
	</script>
</body>
</html>
