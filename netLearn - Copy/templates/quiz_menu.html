<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Quiz - TKJ Smart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <nav class="top-nav">
            <a href="/dashboard" class="btn-back">
                <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
            </a>
        </nav>

        <header class="header">
            <h1>Uji Kemampuanmu</h1>
            <p>Pilih kuis sesuai materi yang sudah kamu pelajari untuk mengasah keahlianmu.</p>
        </header>

        <div class="quiz-grid">
            {% for q in quiz_list %}
            <div class="quiz-card">
                <div class="quiz-icon">
                    <i class="{{ q.icon }}"></i>
                </div>
                <h3>{{ q.judul }}</h3>
                <p>{{ q.soal_count }} Pertanyaan Pilihan Ganda</p>
                <a href="/quiz/kerjakan/{{ q.id }}" class="btn-start">Mulai Kuis</a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
